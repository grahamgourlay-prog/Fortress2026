<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<title>Fortress 2026</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, -apple-system, sans-serif; background: #f8f9fb; color: #1e2d40; font-size: 13px; padding: 14px 10px 60px; }
.label { font-size: 9px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #7a8fa8; }
.header { border-bottom: 2px solid #1a2e4a; padding-bottom: 12px; margin-bottom: 14px; }
.header-sub { font-size: 9px; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase; color: #7a8fa8; }
.header-title { font-size: 20px; font-weight: 700; color: #1a2e4a; margin-top: 3px; }
.header-date { font-size: 9px; color: #a8b8cc; margin-top: 3px; }
.scenarios { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
.scenario { flex: 1 1 150px; background: #fff; border: 1px solid #dde3ec; padding: 9px 12px; }
.scenario-label { font-size: 9px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 2px; }
.scenario-prob { font-family: monospace; font-size: 22px; font-weight: 700; }
.scenario-desc { font-size: 10px; color: #4a5e78; margin-top: 2px; line-height: 1.4; }
.macro { background: #fffbeb; border: 1px solid #fde68a; border-left: 4px solid #d97706; padding: 10px 14px; margin-bottom: 12px; }
.macro-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
.macro-chips { display: flex; gap: 8px 28px; flex-wrap: wrap; }
.macro-chip-val { font-family: monospace; font-size: 13px; font-weight: 700; color: #1a2e4a; }
.macro-chip-chg { font-family: monospace; font-size: 10px; font-weight: 600; }
.macro-chip-note { font-size: 9px; font-weight: 600; margin-top: 1px; }

/* ── Portfolio section ──────────────────────────────────────── */
.portfolio-section { background: #fff; border: 1px solid #dde3ec; border-top: 3px solid #1a2e4a; padding: 12px 14px; margin-bottom: 12px; }
.portfolio-section-title { font-size: 9px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #7a8fa8; margin-bottom: 10px; }
.portfolio-grid { display: flex; gap: 8px 0; flex-wrap: wrap; }
.portfolio-col { flex: 1 1 120px; padding: 0 12px; border-right: 1px solid #eef1f6; }
.portfolio-col:first-child { padding-left: 0; }
.portfolio-col:last-child { border-right: none; }
.portfolio-val { font-family: monospace; font-size: 17px; font-weight: 700; color: #1a2e4a; margin-top: 3px; }
.portfolio-sub { font-size: 10px; color: #7a8fa8; margin-top: 2px; }
.portfolio-total-col { flex: 1 1 160px; padding: 0 12px; border-left: 2px solid #1a2e4a; }
.portfolio-total-val { font-family: monospace; font-size: 20px; font-weight: 700; color: #1a2e4a; margin-top: 3px; }
.baseline-row { margin-top: 10px; padding-top: 8px; border-top: 1px solid #eef1f6; display: flex; gap: 16px; flex-wrap: wrap; align-items: center; }
.baseline-label { font-size: 9px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: #7a8fa8; }
.baseline-val { font-family: monospace; font-size: 12px; font-weight: 700; }
.dp-input { width: 90px; text-align: right; font-family: monospace; font-size: 15px; font-weight: 700; color: #1a2e4a; padding: 2px 5px; border-radius: 3px; border: 1px solid #c8d2e0; background: #f1f4f8; outline: none; }
.dp-input:focus { border-color: #93c5fd; background: #eff6ff; }

/* ── Fetch bar ──────────────────────────────────────────────── */
.fetch-bar { background: #fff; border: 1px solid #dde3ec; padding: 10px 14px; margin-bottom: 10px; display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
.btn-fetch { background: #1a2e4a; color: #fff; border: none; border-radius: 4px; padding: 9px 18px; font-size: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; }
.btn-fetch:disabled { background: #9ca3af; cursor: default; }
.fetch-status { font-family: monospace; font-size: 10px; }
.fetch-hint { font-size: 9px; color: #a8b8cc; margin-top: 2px; }

/* ── Position cards ─────────────────────────────────────────── */
.pos-card { background: #fff; border: 1px solid #dde3ec; margin-bottom: 7px; }
.pos-main { padding: 10px 12px; display: flex; align-items: flex-start; gap: 10px; flex-wrap: wrap; }
.pos-identity { flex: 1 1 140px; min-width: 120px; }
.pos-ticker { font-family: monospace; font-weight: 700; font-size: 14px; color: #1a2e4a; }
.pos-name { font-size: 10px; color: #4a5e78; margin-top: 1px; }
.pos-role { font-size: 9px; color: #a8b8cc; margin-top: 1px; }
.badge { font-size: 8px; font-weight: 700; padding: 1px 4px; border-radius: 2px; margin-left: 4px; }
.badge-sealed { color: #b91c1c; background: #fef2f2; border: 1px solid #fecaca; }
.badge-live { color: #1d4ed8; background: #eff6ff; border: 1px solid #bfdbfe; }
.pos-fields { display: flex; gap: 10px 14px; flex-wrap: wrap; align-items: flex-start; }
.field { text-align: right; min-width: 52px; }
.field-val { font-family: monospace; font-size: 12px; font-weight: 600; color: #1a2e4a; }
.live-input { width: 66px; text-align: right; font-family: monospace; font-size: 12px; padding: 2px 5px; border-radius: 3px; border: 1px solid #c8d2e0; background: #f1f4f8; color: #1a2e4a; outline: none; }
.live-input:focus { border-color: #93c5fd; background: #eff6ff; }
.live-input.fetched { border-color: #93c5fd; background: #eff6ff; }
.pl-pos { color: #16803c; } .pl-neg { color: #b91c1c; }
.day-pos { color: #16803c; font-family: monospace; font-size: 10px; }
.day-neg { color: #b91c1c; font-family: monospace; font-size: 10px; }

/* ── Orders panel ───────────────────────────────────────────── */
.orders-panel { border-top: 1px solid #f1f4f8; background: #f8f9fb; padding: 10px 12px; }
.order-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; flex-wrap: wrap; }
.order-label { font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: #7a8fa8; min-width: 110px; flex-shrink: 0; }
.order-price { font-family: monospace; font-size: 11px; color: #1a2e4a; min-width: 52px; }
.order-amt { font-family: monospace; font-size: 11px; color: #4a5e78; min-width: 46px; }
.order-pct { font-family: monospace; font-size: 11px; font-weight: 700; padding: 1px 6px; border-radius: 3px; }

/* ── Totals / Ladder ────────────────────────────────────────── */
.totals { background: #fff; border: 2px solid #1a2e4a; padding: 12px 14px; margin-top: 4px; display: flex; gap: 20px; flex-wrap: wrap; align-items: center; }
.total-val { font-family: monospace; font-size: 16px; font-weight: 700; }
.ladder { background: #fff; border: 1px solid #dde3ec; padding: 10px 14px; margin-top: 10px; }
.ladder-tiers { display: flex; gap: 4px 16px; flex-wrap: wrap; margin-top: 6px; }
.ladder-tier { font-family: monospace; font-size: 11px; color: #4a5e78; }
.footer { margin-top: 8px; font-size: 9px; color: #c8d2e0; line-height: 1.6; }
@keyframes spin { to { transform: rotate(360deg); } }
.spinner { display: inline-block; width: 11px; height: 11px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; animation: spin 0.7s linear infinite; }
</style>
</head>
<body>
<div class="header">
  <div class="header-sub">Fortress 2026 · Interactive Investor SIPP</div>
  <div class="header-title">Satellite Portfolio Dashboard</div>
  <div class="header-date" id="hdate"></div>
</div>
<div class="scenarios" id="scenarios"></div>
<div class="macro" id="macro-bar"></div>
<div class="portfolio-section" id="portfolio-section"></div>
<div class="fetch-bar">
  <button class="btn-fetch" id="btn-fetch" onclick="fetchAll()">⟳&nbsp; Fetch All Prices + Macro</button>
  <div>
    <div class="fetch-status" id="fetch-status" style="color:#7a8fa8">Ready · ~5 seconds</div>
    <div class="fetch-hint">Restores from last session · manual entry always works</div>
  </div>
</div>
<div id="positions"></div>
<div class="ladder" id="ladder"></div>
<div class="footer">Market value = live price × shares · Prices persist via localStorage · Last edited: 05 Mar 2026</div>
<script>
const POSITIONS=[
  {ticker:"SGLN",name:"iShares Physical Gold ETC",role:"Core stagflation anchor",shares:38,avgCost:75.42,bookValue:2865.84,sealed:false,
   orders:[{label:"Pre-Emption",price:69.95,amount:1097.56},{label:"Deleveraging",price:68.45,amount:1423.33},{label:"Capitulation",price:66.85,amount:1097.56}]},
  {ticker:"DFNG",name:"VanEck Defense UCITS ETF",role:"Kinetic / rearmament hedge",shares:27,avgCost:51.55,bookValue:1391.84,sealed:false,
   orders:[{label:"Queue Jump",price:51.50,amount:2000},{label:"Legacy Net",price:48.65,amount:1200},{label:"Wick Fisher",price:47.50,amount:1423.32}]},
  {ticker:"SSLN",name:"iShares Physical Silver ETC",role:"Inflation hedge / COMEX squeeze",shares:72,avgCost:62.28,bookValue:4483.83,sealed:false,
   orders:[{label:"Mid Trap",price:54.15,amount:1000}]},
  {ticker:"GDGB",name:"VanEck Gold Miners UCITS ETF",role:"Miner margin super-cycle",shares:14,avgCost:84.461,bookValue:1182.46,sealed:false,
   orders:[{label:"Correction Trap",price:73.43,amount:1100},{label:"Capitulation Trap",price:57.97,amount:1100}]},
  {ticker:"IEUX",name:"iShares MSCI Europe ex-UK ETF",role:"Scenario C / rearmament economy",shares:40,avgCost:46.24,bookValue:1849.75,sealed:false,
   orders:[{label:"Mid Trap",price:41.80,amount:786.66}]},
  {ticker:"NUCG",name:"VanEck Uranium and Nuclear Technologies UCITS ETF",role:"AI baseload / uranium squeeze",shares:26,avgCost:46.651,bookValue:1212.93,sealed:false,
   orders:[{label:"Liquidity Wick",price:38.95,amount:798}]},
  {ticker:"COPG",name:"Global X Copper Miners ETF",role:"AI infrastructure deficit",shares:24,avgCost:49.571,bookValue:1189.71,sealed:false,
   orders:[{label:"Liquidity Wick",price:41.40,amount:798.43}]},
  {ticker:"CYBP",name:"Rize Cyber Security ETF",role:"High-beta alpha / M&A targets",shares:268,avgCost:5.02,bookValue:1345.09,sealed:true,
   orders:[]},
  {ticker:"NAVY",name:"VanEck Future of European Defence UCITS ETF",role:"European rearmament pure-play",shares:89,avgCost:9.356,bookValue:832.64,sealed:false,
   orders:[{label:"Mid Trap",price:9.00,amount:835},{label:"Deep Trap",price:8.70,amount:835}]},
];
const SCENARIOS=[
  {label:"A — Systemic Dislocation",prob:"85%",color:"#1d4ed8",desc:"Private credit + Section 122 cliff + kinetic escalation → SWDA ladder triggers"},
  {label:"B — Purgatory",prob:"15%",color:"#d97706",desc:"Oct 31, VIX >15 · Deploy 50% dry powder (~£43,821) into XDEQ"},
  {label:"C — Normalisation",prob:"~0%",color:"#9ca3af",desc:"Eliminated · VIX 26 on 3 Mar makes 30-day MA <15 by Oct 31 impossible"},
];
const LADDER=[{t:"T1",p:-22,v:77.83},{t:"T2",p:-25,v:74.83},{t:"T3",p:-32,v:67.85},{t:"T4",p:-35,v:64.86},{t:"T5",p:-42,v:57.87},{t:"T6",p:-45,v:54.88}];

// Baseline = total amount transferred into SIPP
const BASELINE = 33734.58;

const SK="fortress2026_v6";
const gbp=n=>"£"+Math.abs(n).toLocaleString("en-GB",{minimumFractionDigits:2,maximumFractionDigits:2});
const gbp0=n=>"£"+Math.abs(n).toLocaleString("en-GB",{maximumFractionDigits:0});
const pct=(a,b)=>(a-b)/b*100;
const fmt=n=>n<10?n.toFixed(3):n.toFixed(2);
const sgn=n=>n>=0?"+":"";
function dStyle(v){if(v>=0)return"color:#16803c;background:#f0fdf4;border:1px solid #bbf7d0";if(v>=-5)return"color:#78350f;background:#fffbeb;border:1px solid #fde68a";if(v>=-15)return"color:#c2410c;background:#fff7ed;border:1px solid #fed7aa";return"color:#b91c1c;background:#fef2f2;border:1px solid #fecaca"}

let prices={}, prevCloses={}, fetched=new Set(), macro={}, dryPowder=0;

function saveState(){try{localStorage.setItem(SK,JSON.stringify({prices,prevCloses,macro,dryPowder}))}catch(_){}}
function loadState(){try{const r=localStorage.getItem(SK);if(!r)return;const s=JSON.parse(r);prices=s.prices||{};prevCloses=s.prevCloses||{};macro=s.macro||{};dryPowder=typeof s.dryPowder==="number"?s.dryPowder:0;fetched=new Set(Object.keys(prices));setStatus("Restored from last session — press Fetch to refresh","ok")}catch(_){}}

async function fetchAll(){
  const btn=document.getElementById("btn-fetch");
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span> Fetching…';
  setStatus("Fetching live prices from Yahoo Finance…","neutral");
  try{
    const r=await fetch("https://aged-sea-a3e0.grahamgourlay.workers.dev");
    if(!r.ok)throw new Error(`HTTP ${r.status}`);
    const res=await r.json();
    if(!res.prices)throw new Error("Invalid response");
    const np={};
    POSITIONS.forEach(p=>{const v=res.prices?.[p.ticker];if(v&&v>0)np[p.ticker]=v});
    prices=np;
    prevCloses=res.prevClose||{};
    fetched=new Set(Object.keys(np));
    macro={swda:res.macro?.swda||null,swdaPrevClose:res.macro?.swdaPrevClose||null,brent:res.macro?.brent||null,vix:res.macro?.vix||null,vixPrevClose:res.macro?.vixPrevClose||null,ts:res.ts||Date.now(),src:res.src||""};
    saveState();
    const t=new Date().toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"});
    setStatus(`✓ ${Object.keys(np).length}/${POSITIONS.length} prices found — ${t}`,"ok");
  }catch(e){setStatus(`✗ ${e.message} — try manually`,"err")}
  btn.disabled=false;btn.innerHTML="⟳&nbsp; Fetch All Prices + Macro";render();
}

function setStatus(msg,type){const el=document.getElementById("fetch-status");el.textContent=msg;el.style.color=type==="ok"?"#16803c":type==="err"?"#b91c1c":"#7a8fa8"}
function onPriceChange(ticker,val){const v=parseFloat(val);if(!isNaN(v)&&v>0){prices[ticker]=v;fetched.delete(ticker)}else{delete prices[ticker]}saveState();render()}
function onDryPowderChange(val){const v=parseFloat(val.replace(/[^0-9.]/g,""));dryPowder=isNaN(v)?0:v;saveState();render()}

function render(){renderDate();renderScenarios();renderMacro();renderPortfolio();renderPositions();renderLadder()}
function renderDate(){document.getElementById("hdate").textContent=new Date().toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long",year:"numeric"}).toUpperCase()+"  ·  PASSIVE EXECUTION MANDATE"}
function renderScenarios(){document.getElementById("scenarios").innerHTML=SCENARIOS.map(s=>`<div class="scenario" style="border-left:4px solid ${s.color}"><div class="scenario-label" style="color:${s.color}">${s.label}</div><div class="scenario-prob" style="color:${s.color}">${s.prob}</div><div class="scenario-desc">${s.desc}</div></div>`).join("")}

function renderMacro(){
  const swdaPct=macro.swda?pct(macro.swda,99.78):null;
  const t1gap=macro.swda?pct(77.83,macro.swda):null;
  const ts=macro.ts?new Date(macro.ts).toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"}):null;
  const swdaDayPct=macro.swda&&macro.swdaPrevClose?pct(macro.swda,macro.swdaPrevClose):null;
  const vixDayChg=macro.vix&&macro.vixPrevClose?macro.vix-macro.vixPrevClose:null;
  const chips=[
    {k:"SWDA",val:macro.swda?`${(macro.swda*100).toFixed(0)}p`:"—",
     extra:swdaPct!=null?`${sgn(swdaPct)}${swdaPct.toFixed(1)}% from ATH`:null,
     day:swdaDayPct!=null?`${sgn(swdaDayPct)}${swdaDayPct.toFixed(2)}% today`:null,
     note:t1gap!=null?`T1 trigger ${Math.abs(t1gap).toFixed(1)}% away`:null,nc:"#16803c"},
    {k:"Brent",val:macro.brent?`$${macro.brent.toFixed(2)}`:"—",extra:null,day:null,
     note:macro.brent>80?"⚠ Supply shock active":null,nc:"#b91c1c"},
    {k:"VIX",val:macro.vix?macro.vix.toFixed(2):"—",extra:null,
     day:vixDayChg!=null?`${sgn(vixDayChg)}${vixDayChg.toFixed(2)} today`:null,
     note:macro.vix>25?"Scenario C eliminated":macro.vix>15?"Elevated":null,nc:macro.vix>25?"#b91c1c":"#92400e"},
  ];
  document.getElementById("macro-bar").innerHTML=
    `<div class="macro-header"><span class="label" style="color:#92400e">Macro Watch</span>${ts?`<span style="font-size:9px;color:#a8b8cc;font-family:monospace">updated ${ts}</span>`:""}${macro.src?`<span style="font-size:9px;color:#a8b8cc">· ${macro.src}</span>`:""}${!ts?`<span style="font-size:9px;color:#a8b8cc">— press Fetch to load</span>`:""}<button onclick="fetchAll()" style="margin-left:auto;background:#1a2e4a;color:#fff;border:none;border-radius:3px;padding:3px 12px;font-size:10px;font-weight:600;cursor:pointer">⟳ Refresh</button></div>
    <div class="macro-chips">${chips.map(({k,val,extra,day,note,nc})=>`<div><div style="display:flex;align-items:baseline;gap:5px"><span style="font-size:10px;font-weight:700;color:#78350f;min-width:36px">${k}</span><span class="macro-chip-val">${val}</span>${extra?`<span class="macro-chip-chg" style="color:#4a5e78">${extra}</span>`:""}</div>${day?`<div style="font-size:9px;color:#7a8fa8;font-family:monospace">${day}</div>`:""} ${note?`<div class="macro-chip-note" style="color:${nc}">${note}</div>`:""}</div>`).join("")}</div>`;
}

function renderPortfolio(){
  const tB=POSITIONS.reduce((s,p)=>s+p.bookValue,0);
  const tP=POSITIONS.reduce((s,p)=>s+p.orders.reduce((a,o)=>a+o.amount,0),0);
  const lv=POSITIONS.map(p=>prices[p.ticker]>0?prices[p.ticker]*p.shares:null);
  const allLive=lv.every(v=>v!==null);
  const tL=allLive?lv.reduce((a,v)=>a+v,0):null;

  // Daily P&L across all positions
  const dailyVals=POSITIONS.map(p=>{
    const lp=prices[p.ticker];
    const pc=prevCloses[p.ticker];
    if(!lp||!pc)return null;
    return(lp-pc)*p.shares;
  });
  const allDay=dailyVals.every(v=>v!==null);
  const tDay=allDay?dailyVals.reduce((a,v)=>a+v,0):null;
  const tDayPct=tL&&tDay!==null?tDay/(tL-tDay)*100:null;

  // Portfolio total = market value + pending capital + dry powder
  const portfolioTotal=tL!==null?tL+tP+dryPowder:null;

  // Gain vs baseline
  const baselineGain=portfolioTotal!==null?portfolioTotal-BASELINE:null;
  const baselinePct=baselineGain!==null?baselineGain/BASELINE*100:null;

  // Book P&L
  const bookPL=tL!==null?tL-tB:null;
  const bookPct=bookPL!==null?pct(tL,tB):null;

  document.getElementById("portfolio-section").innerHTML=`
    <div class="portfolio-section-title">Portfolio Value</div>
    <div class="portfolio-grid">
      <div class="portfolio-col">
        <div class="label">Market Value</div>
        <div class="portfolio-val">${tL!==null?gbp0(tL):"—"}</div>
        <div class="portfolio-sub">${bookPL!==null?`${bookPL>=0?"+":"−"}${gbp0(Math.abs(bookPL))} vs book (${sgn(bookPct)}${bookPct.toFixed(1)}%)`:"live prices needed"}</div>
        ${tDay!==null?`<div class="portfolio-sub" style="color:${tDay>=0?"#16803c":"#b91c1c"};margin-top:2px">${sgn(tDay)}${gbp(Math.abs(tDay))} today (${sgn(tDayPct)}${tDayPct.toFixed(2)}%)</div>`:""}
      </div>
      <div class="portfolio-col">
        <div class="label">Pending Capital</div>
        <div class="portfolio-val">${gbp0(tP)}</div>
        <div class="portfolio-sub">${POSITIONS.reduce((s,p)=>s+p.orders.length,0)} GTC trap orders</div>
      </div>
      <div class="portfolio-col">
        <div class="label">Dry Powder</div>
        <div style="display:flex;align-items:center;gap:6px;margin-top:3px">
          <span style="font-family:monospace;font-size:17px;font-weight:700;color:#7a8fa8">£</span>
          <input class="dp-input" type="number" min="0" step="100"
            value="${dryPowder.toFixed(2)}"
            onchange="onDryPowderChange(this.value)"
            title="Edit dry powder (uninvested cash)">
        </div>
        <div class="portfolio-sub">uninvested cash · edit to update</div>
      </div>
      <div class="portfolio-total-col">
        <div class="label">Total Portfolio</div>
        <div class="portfolio-total-val">${portfolioTotal!==null?gbp0(portfolioTotal):"—"}</div>
        <div class="portfolio-sub">${portfolioTotal!==null?"market + pending + cash":"live prices needed"}</div>
      </div>
    </div>
    <div class="baseline-row">
      <span class="baseline-label">vs Baseline (£${BASELINE.toLocaleString("en-GB",{minimumFractionDigits:2})} transferred in)</span>
      ${baselineGain!==null
        ?`<span class="baseline-val" style="color:${baselineGain>=0?"#16803c":"#b91c1c"}">${baselineGain>=0?"+":"−"}${gbp(Math.abs(baselineGain))}</span>
          <span class="baseline-val" style="color:${baselineGain>=0?"#16803c":"#b91c1c"}">${sgn(baselinePct)}${baselinePct.toFixed(2)}%</span>`
        :`<span style="font-size:10px;color:#a8b8cc">enter dry powder + fetch live prices to calculate</span>`
      }
    </div>`;
}

function renderPositions(){
  document.getElementById("positions").innerHTML=POSITIONS.map(pos=>{
    const lp=prices[pos.ticker]||0;
    const pc=prevCloses[pos.ticker]||0;
    const isF=fetched.has(pos.ticker);
    const ref=lp>0?lp:pos.avgCost;
    const mkt=lp>0?lp*pos.shares:null;
    const plv=mkt!==null?mkt-pos.bookValue:null;
    const plp=lp>0?pct(lp,pos.avgCost):null;
    const pp=plv!==null&&plv>=0;

    // Daily change
    const dayAbs=lp>0&&pc>0?(lp-pc)*pos.shares:null;
    const dayPct=lp>0&&pc>0?pct(lp,pc):null;
    const dayPos=dayAbs!==null&&dayAbs>=0;

    // Orders panel (always shown if orders exist)
    const ordersHtml=pos.orders.length>0
      ?`<div class="orders-panel"><div class="label" style="margin-bottom:6px">Pending Orders — % ${lp>0?"vs live":"vs avg cost"}</div>${pos.orders.map(o=>{
          const d=pct(o.price,ref);
          const pr=o.price<10?`£${o.price.toFixed(3)}`:`${o.price.toFixed(2)}p`;
          return`<div class="order-row"><span class="order-label">${o.label}</span><span class="order-price">${pr}</span><span class="order-amt">${gbp0(o.amount)}</span><span class="order-pct" style="${dStyle(d)}">${sgn(d)}${d.toFixed(1)}%</span></div>`;
        }).join("")}</div>`
      :"";

    return`<div class="pos-card" style="border-left:4px solid ${pos.sealed?"#fecaca":"#1a2e4a"}">
      <div class="pos-main">
        <div class="pos-identity">
          <div><span class="pos-ticker">${pos.ticker}</span>${pos.sealed?'<span class="badge badge-sealed">SEALED</span>':""}${isF&&lp>0?'<span class="badge badge-live">LIVE</span>':""}</div>
          <div class="pos-name">${pos.name}</div>
          <div class="pos-role">${pos.role}</div>
        </div>
        <div class="pos-fields">
          <div class="field">
            <div class="label">Shares</div>
            <div class="field-val">${pos.shares}</div>
          </div>
          <div class="field">
            <div class="label">Avg Cost</div>
            <div class="field-val">£${fmt(pos.avgCost)}</div>
          </div>
          <div class="field">
            <div class="label">Book</div>
            <div class="field-val">${gbp0(pos.bookValue)}</div>
          </div>
          <div class="field" style="min-width:66px">
            <div class="label">Live £</div>
            <input class="live-input ${isF&&lp>0?"fetched":""}" type="number" step="0.01" min="0" placeholder="—" value="${lp>0?lp:""}" onchange="onPriceChange('${pos.ticker}',this.value)">
          </div>
          ${mkt!==null?`<div class="field" style="min-width:56px">
            <div class="label">Mkt Val</div>
            <div class="field-val">${gbp0(mkt)}</div>
          </div>`:""}
          ${plv!==null?`<div class="field" style="min-width:64px">
            <div class="label">P&amp;L</div>
            <div class="field-val ${pp?"pl-pos":"pl-neg"}">${pp?"+":"−"}${gbp0(Math.abs(plv))}</div>
            <div style="font-family:monospace;font-size:10px;color:${pp?"#16803c":"#b91c1c"}">${sgn(plp)}${plp.toFixed(1)}%</div>
          </div>`:""}
          ${dayAbs!==null?`<div class="field" style="min-width:64px">
            <div class="label">Today</div>
            <div class="${dayPos?"day-pos":"day-neg"}">${dayPos?"+":"−"}${gbp(Math.abs(dayAbs))}</div>
            <div style="font-family:monospace;font-size:10px;color:${dayPos?"#16803c":"#b91c1c"}">${sgn(dayPct)}${dayPct.toFixed(2)}%</div>
          </div>`:""}
        </div>
      </div>
      ${ordersHtml}
    </div>`;
  }).join("")
}

function renderLadder(){document.getElementById("ladder").innerHTML=`<div class="label">SWDA Shadow Ladder · ATH £99.78 · Oct 31, 2026 deadline non-negotiable</div><div class="ladder-tiers">${LADDER.map(t=>`<div class="ladder-tier"><strong style="color:#1a2e4a">${t.t}</strong> ${t.p}% → £${t.v}</div>`).join("")}</div>`}

loadState();render();
</script>
</body>
</html>
