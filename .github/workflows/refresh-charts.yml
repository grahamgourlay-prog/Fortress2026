name: Refresh Chart Dashboard

on:
  # Runs automatically at 17:30 UTC on weekdays (after LSE closes at 16:30 UTC)
  schedule:
    - cron: '30 17 * * 1-5'

  # Also allows manual trigger: via GitHub Actions UI, or via `gh workflow run refresh-charts.yml`
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas numpy

      - name: Fetch data and generate dashboard
        run: |
          cd "Chart Dashboard"
          python fetch_portfolio.py

      - name: Commit and push updated dashboard
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add portfolio_dashboard.html
          git diff --staged --quiet || git commit -m "chore: refresh charts $(date -u +'%d %b %Y %H:%M UTC')"
          git push
